basePath: /api
definitions:
  article.Article:
    properties:
      author:
        example: 张三
        type: string
      content:
        example: '# Markdown内容'
        type: string
      created_at:
        type: string
      id:
        example: 1
        type: integer
      title:
        example: 标题五个字
        type: string
      updated_at:
        type: string
    type: object
  article.CreateRequest:
    properties:
      author:
        example: 社团负责人
        type: string
      content:
        example: |-
          # 第一章：拒绝模糊逻辑
          这是一篇关于 Go 强类型的文章。
        type: string
      title:
        example: 关于后端严谨性的深度思考
        type: string
    required:
    - content
    - title
    type: object
  article.ErrorResponse:
    properties:
      error:
        example: 参数校验失败：标题不能为空
        type: string
    type: object
  asset.SuccessResponse:
    properties:
      id:
        type: integer
      url:
        type: string
    type: object
  upload.ErrorResponse:
    properties:
      error:
        example: 错误描述
        type: string
    type: object
  upload.UploadResponse:
    properties:
      id:
        example: 1
        type: integer
      message:
        example: 上传成功
        type: string
      url:
        example: /uploads/images/2026/03/25/uuid.png
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: AIA 论坛后端。
  title: AIA 社团博客 API
  version: "1.0"
paths:
  /articles:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/article.Article'
            type: array
      summary: 获取所有博客文章列表
      tags:
      - 博客接口
    post:
      consumes:
      - application/json
      parameters:
      - description: 文章数据
        in: body
        name: article
        required: true
        schema:
          $ref: '#/definitions/article.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/article.ErrorResponse'
      summary: 发布一篇 Markdown 博客
      tags:
      - 博客接口
  /articles/{id}:
    get:
      parameters:
      - description: 博客ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/article.Article'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/article.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/article.ErrorResponse'
      summary: 获取特定 ID 的博客
      tags:
      - 博客接口
  /assets:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: 文件
        in: formData
        name: file
        required: true
        type: file
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/asset.SuccessResponse'
      summary: 上传资源
      tags:
      - 资源接口
  /upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: 文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/upload.UploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/upload.ErrorResponse'
      summary: 上传资源文件
      tags:
      - 资源接口
swagger: "2.0"
